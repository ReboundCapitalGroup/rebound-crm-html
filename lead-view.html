<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lead Details — Rebound Capital Group CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="crm.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
.contact-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
.contact-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:1rem;}
.contact-name{font-size:1.1rem;font-weight:600;color:#fff;}
.contact-actions{display:flex;gap:0.5rem;}
.btn-icon{padding:0.5rem;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#94a3b8;cursor:pointer;transition:all 0.2s;}
.btn-icon:hover{background:#334155;color:#fff;}
.contact-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0.75rem;font-size:0.875rem;}
.contact-field{color:#94a3b8;}
.contact-field strong{color:#fff;font-weight:500;}
.contact-form{background:#0f172a;border:1px solid #334155;border-radius:12px;padding:1.5rem;margin-bottom:1rem;}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;}
.form-grid .full-width{grid-column:1/-1;}
</style>
</head>
<body>
<div class="toast-container" id="toastContainer"></div>

<div class="topbar">
  <a class="topbar-brand" href="dashboard.html">
    <span class="topbar-icon">💼</span>
    <span>Rebound Capital Group</span>
  </a>
  <div class="topbar-right">
    <div class="topbar-search">
      <i class="fas fa-search"></i>
      <input type="text" placeholder="Search leads...">
    </div>
    <div class="user-menu">
      <button class="user-btn" id="userBtn" onclick="document.getElementById('userDropdown').classList.toggle('show')">U</button>
      <div class="user-dropdown" id="userDropdown">
        <div class="user-dropdown-header">
          <div class="name" id="dropName">User</div>
          <div class="email" id="dropEmail"></div>
        </div>
        <div class="divider"></div>
        <a onclick="logout()"><i class="fas fa-power-off"></i> Logout</a>
      </div>
    </div>
  </div>
</div>

<div class="sidebar">
  <div class="sidebar-user">
    <div class="sidebar-avatar" id="sidebarInitials">U</div>
    <div class="sidebar-user-info">
      <div class="user-name" id="sidebarName">User</div>
      <div class="user-role">Agent</div>
    </div>
  </div>
  <div class="sidebar-divider">Menu</div>
  <div>
    <button class="sidebar-toggle open" onclick="toggleSidebar(this,'sub1')">
      <i class="fas fa-user-circle icon"></i> <span id="sidebarMenuName">User</span>
      <i class="fas fa-chevron-down chevron"></i>
    </button>
    <div class="sidebar-submenu open" id="sub1">
      <a href="dashboard.html">Dashboard</a>
    </div>
  </div>
  <div>
    <button class="sidebar-toggle" onclick="toggleSidebar(this,'sub2')">
      <i class="fas fa-briefcase icon"></i> Leads
      <i class="fas fa-chevron-down chevron"></i>
    </button>
    <div class="sidebar-submenu" id="sub2">
      <a href="all-leads.html">All Leads</a>
    </div>
  </div>
</div>

<div class="main-content">
  <div class="content-area">
    <div class="page-header">
      <h1 id="leadTitle">Lead Details</h1>
      <p class="subtitle" id="leadSubtitle">Loading...</p>
      <div class="breadcrumb">
        <a href="dashboard.html">Dashboard</a>
        <span class="breadcrumb-sep">/</span>
        <a href="all-leads.html">All Leads</a>
        <span class="breadcrumb-sep">/</span>
        <span>Lead Details</span>
      </div>
    </div>

    <!-- Lead Info -->
    <div class="card">
      <div class="card-header">
        <h5>Property Information</h5>
        <div style="display:flex;gap:0.75rem;">
          <select id="statusSelect" class="form-control" style="width:auto;" onchange="updateStatus()">
            <option>New</option>
            <option>Contacted</option>
            <option>Interested</option>
            <option>Not Interested</option>
            <option>Dead</option>
          </select>
        </div>
      </div>
      <div class="card-body">
        <div id="leadDetails" style="display:grid;grid-template-columns:repeat(2,1fr);gap:1.5rem;">
          <div class="loading-row"><div class="spinner"></div> Loading...</div>
        </div>
      </div>
    </div>

    <!-- Contacts Section -->
    <div class="card">
      <div class="card-header">
        <h5><i class="fas fa-users" style="color:#d4af37;margin-right:0.5rem;"></i> Contact Information</h5>
        <button class="btn btn-gold btn-sm" onclick="showContactForm()">
          <i class="fas fa-plus"></i> Add Contact
        </button>
      </div>
      <div class="card-body">
        <div id="contactFormContainer" style="display:none;">
          <div class="contact-form">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;">
              <h6 style="font-size:1rem;font-weight:600;margin:0;" id="formTitle">Add New Contact</h6>
              <button class="btn-icon" onclick="hideContactForm()"><i class="fas fa-times"></i></button>
            </div>
            <div class="form-grid">
              <div><label class="form-label">First Name</label><input type="text" id="c_first_name" class="form-control"></div>
              <div><label class="form-label">Last Name</label><input type="text" id="c_last_name" class="form-control"></div>
              <div><label class="form-label">Date of Birth</label><input type="date" id="c_dob" class="form-control"></div>
              <div><label class="form-label">Phone</label><input type="tel" id="c_phone" class="form-control"></div>
              <div><label class="form-label">Secondary Phone</label><input type="tel" id="c_phone2" class="form-control"></div>
              <div><label class="form-label">Email</label><input type="email" id="c_email" class="form-control"></div>
              <div class="full-width"><label class="form-label">Address</label><input type="text" id="c_address" class="form-control"></div>
              <div><label class="form-label">City</label><input type="text" id="c_city" class="form-control"></div>
              <div><label class="form-label">State</label><input type="text" id="c_state" class="form-control" maxlength="2" style="text-transform:uppercase;"></div>
              <div><label class="form-label">ZIP</label><input type="text" id="c_zip" class="form-control"></div>
              <div><label class="form-label">Social Media</label><input type="text" id="c_social" class="form-control" placeholder="Facebook, Instagram, etc."></div>
              <div class="full-width"><label class="form-label">Additional Information</label><textarea id="c_notes" class="form-control" rows="2"></textarea></div>
            </div>
            <div style="display:flex;gap:0.75rem;margin-top:1.25rem;">
              <button class="btn btn-gold" onclick="saveContact()"><i class="fas fa-save"></i> Save Contact</button>
              <button class="btn btn-outline" onclick="hideContactForm()">Cancel</button>
            </div>
          </div>
        </div>
        
        <div id="contactsList">
          <div class="loading-row"><div class="spinner"></div> Loading contacts...</div>
        </div>
      </div>
    </div>

    <!-- Notes Section -->
    <div class="card">
      <div class="card-header">
        <h5><i class="fas fa-sticky-note" style="color:#d4af37;margin-right:0.5rem;"></i> Notes</h5>
      </div>
      <div class="card-body">
        <div id="notesList" style="margin-bottom:1.25rem;"></div>
        <textarea id="newNote" class="form-control" rows="3" placeholder="Add a note..." style="margin-bottom:0.75rem;"></textarea>
        <button class="btn btn-gold" onclick="addNote()"><i class="fas fa-plus"></i> Add Note</button>
      </div>
    </div>
  </div>
</div>

<script src="crm.js"></script>
<script>
let currentLead = null;
let editingContactId = null;

function toggleSidebar(btn,id){btn.classList.toggle('open');document.getElementById(id).classList.toggle('open');}
document.addEventListener('click',e=>{if(!e.target.closest('.user-menu'))document.getElementById('userDropdown').classList.remove('show');});

async function init() {
  const user = await requireAuth();
  if (!user) return;

  const name = displayName(user.email);
  const initials = name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('userBtn').textContent = initials;
  document.getElementById('dropName').textContent = name;
  document.getElementById('dropEmail').textContent = user.email;
  document.getElementById('sidebarName').textContent = name;
  document.getElementById('sidebarInitials').textContent = initials;
  document.getElementById('sidebarMenuName').textContent = name;

  const params = new URLSearchParams(window.location.search);
  const leadId = params.get('id');
  if (!leadId) { window.location.href = 'all-leads.html'; return; }

  loadLead(leadId);
  loadContacts(leadId);
  loadNotes(leadId);
}

async function loadLead(id) {
  const { data, error } = await sb.from('leads').select('*').eq('id', id).single();
  if (error || !data) { showToast('error', 'Error', 'Lead not found'); return; }
  
  currentLead = data;
  document.getElementById('leadTitle').textContent = data.property_address || 'Lead #' + data.id;
  document.getElementById('leadSubtitle').textContent = data.county + ' • ' + data.case_number;
  document.getElementById('statusSelect').value = data.status || 'New';

  const html = `
    <div><strong>Case Number:</strong><br>${esc(data.case_number)||'—'}</div>
    <div><strong>County:</strong><br>${esc(data.county)||'—'}</div>
    <div><strong>Lead Type:</strong><br>${esc(data.lead_type)||'—'}</div>
    <div><strong>Auction Date:</strong><br>${esc(data.auction_date)||'—'}</div>
    <div><strong>Property Address:</strong><br>${esc(data.property_address)||'—'}</div>
    <div><strong>City:</strong><br>${esc(data.property_city)||'—'}</div>
    <div><strong>ZIP:</strong><br>${esc(data.property_zip)||'—'}</div>
    <div><strong>Surplus:</strong><br><span style="color:#10b981;font-weight:600;">${esc(data.surplus)||'—'}</span></div>
    <div><strong>Assessed Value:</strong><br>${esc(data.assessed_value)||'—'}</div>
    <div><strong>Judgment Amount:</strong><br>${esc(data.judgment_amount)||'—'}</div>
    <div style="grid-column:1/-1;"><strong>Defendants:</strong><br>${esc(data.defendants)||'—'}</div>
    <div style="grid-column:1/-1;"><strong>Plaintiffs:</strong><br>${esc(data.plaintiffs)||'—'}</div>
  `;
  document.getElementById('leadDetails').innerHTML = html;
}

async function loadContacts(leadId) {
  const { data, error } = await sb.from('contacts').select('*').eq('lead_id', String(leadId)).order('created_at', {ascending: false});
  const container = document.getElementById('contactsList');
  
  if (error || !data || data.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">👤</div><p>No contacts yet</p></div>';
    return;
  }

  container.innerHTML = data.map(c => `
    <div class="contact-card">
      <div class="contact-header">
        <div class="contact-name">${esc(c.first_name||'')} ${esc(c.last_name||'')}</div>
        <div class="contact-actions">
          <button class="btn-icon" onclick="editContact(${c.id})"><i class="fas fa-edit"></i></button>
          <button class="btn-icon" onclick="deleteContact(${c.id})"><i class="fas fa-trash"></i></button>
        </div>
      </div>
      <div class="contact-grid">
        ${c.date_of_birth?`<div class="contact-field"><strong>DOB:</strong> ${c.date_of_birth}</div>`:''}
        ${c.phone?`<div class="contact-field"><strong>Phone:</strong> ${esc(c.phone)}</div>`:''}
        ${c.secondary_phone?`<div class="contact-field"><strong>Secondary:</strong> ${esc(c.secondary_phone)}</div>`:''}
        ${c.email?`<div class="contact-field"><strong>Email:</strong> ${esc(c.email)}</div>`:''}
        ${c.address?`<div class="contact-field" style="grid-column:1/-1;"><strong>Address:</strong> ${esc(c.address)}, ${esc(c.city||'')}, ${esc(c.state||'')} ${esc(c.zip||'')}</div>`:''}
        ${c.social_media?`<div class="contact-field"><strong>Social:</strong> ${esc(c.social_media)}</div>`:''}
        ${c.additional_info?`<div class="contact-field" style="grid-column:1/-1;"><strong>Notes:</strong> ${esc(c.additional_info)}</div>`:''}
      </div>
    </div>
  `).join('');
}

function showContactForm() {
  document.getElementById('contactFormContainer').style.display = 'block';
  document.getElementById('formTitle').textContent = 'Add New Contact';
  editingContactId = null;
  clearContactForm();
}

function hideContactForm() {
  document.getElementById('contactFormContainer').style.display = 'none';
  clearContactForm();
}

function clearContactForm() {
  ['c_first_name','c_last_name','c_dob','c_phone','c_phone2','c_email','c_address','c_city','c_state','c_zip','c_social','c_notes'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

async function editContact(id) {
  const { data } = await sb.from('contacts').select('*').eq('id', id).single();
  if (!data) return;
  
  editingContactId = id;
  document.getElementById('formTitle').textContent = 'Edit Contact';
  document.getElementById('c_first_name').value = data.first_name || '';
  document.getElementById('c_last_name').value = data.last_name || '';
  document.getElementById('c_dob').value = data.date_of_birth || '';
  document.getElementById('c_phone').value = data.phone || '';
  document.getElementById('c_phone2').value = data.secondary_phone || '';
  document.getElementById('c_email').value = data.email || '';
  document.getElementById('c_address').value = data.address || '';
  document.getElementById('c_city').value = data.city || '';
  document.getElementById('c_state').value = data.state || '';
  document.getElementById('c_zip').value = data.zip || '';
  document.getElementById('c_social').value = data.social_media || '';
  document.getElementById('c_notes').value = data.additional_info || '';
  document.getElementById('contactFormContainer').style.display = 'block';
}

async function saveContact() {
  const contactData = {
    lead_id: String(currentLead.id),
    first_name: document.getElementById('c_first_name').value,
    last_name: document.getElementById('c_last_name').value,
    date_of_birth: document.getElementById('c_dob').value || null,
    phone: document.getElementById('c_phone').value || null,
    secondary_phone: document.getElementById('c_phone2').value || null,
    email: document.getElementById('c_email').value || null,
    address: document.getElementById('c_address').value || null,
    city: document.getElementById('c_city').value || null,
    state: document.getElementById('c_state').value || null,
    zip: document.getElementById('c_zip').value || null,
    social_media: document.getElementById('c_social').value || null,
    additional_info: document.getElementById('c_notes').value || null
  };

  if (!contactData.first_name && !contactData.last_name) {
    showToast('error', 'Required', 'Please enter at least a first or last name');
    return;
  }

  if (editingContactId) {
    await sb.from('contacts').update(contactData).eq('id', editingContactId);
    showToast('success', 'Updated', 'Contact updated successfully');
  } else {
    await sb.from('contacts').insert([contactData]);
    showToast('success', 'Saved', 'Contact saved successfully');
  }

  hideContactForm();
  loadContacts(currentLead.id);
}

async function deleteContact(id) {
  if (!confirm('Delete this contact?')) return;
  await sb.from('contacts').delete().eq('id', id);
  showToast('success', 'Deleted', 'Contact deleted');
  loadContacts(currentLead.id);
}

async function loadNotes(leadId) {
  const { data } = await sb.from('notes').select('*').eq('lead_id', leadId).order('created_at', {ascending: false});
  const container = document.getElementById('notesList');
  
  if (!data || data.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📝</div><p>No notes yet</p></div>';
    return;
  }

  container.innerHTML = data.map(n => `
    <div style="background:#0f172a;border:1px solid #334155;border-radius:8px;padding:1rem;margin-bottom:0.75rem;">
      <div style="display:flex;justify-content:space-between;margin-bottom:0.5rem;">
        <strong style="color:#d4af37;">${esc(n.author)}</strong>
        <span style="color:#94a3b8;font-size:0.8rem;">${fmtDateTime(n.created_at)}</span>
      </div>
      <p style="color:#fff;margin:0;">${esc(n.text)}</p>
    </div>
  `).join('');
}

async function addNote() {
  const text = document.getElementById('newNote').value.trim();
  if (!text) return;

  await sb.from('notes').insert([{
    lead_id: currentLead.id,
    text: text,
    author: CURRENT_USER.email.split('@')[0],
    created_at: new Date().toISOString()
  }]);

  document.getElementById('newNote').value = '';
  loadNotes(currentLead.id);
  showToast('success', 'Saved', 'Note added');
}

async function updateStatus() {
  const status = document.getElementById('statusSelect').value;
  await sb.from('leads').update({ status }).eq('id', currentLead.id);
  showToast('success', 'Updated', 'Status updated to ' + status);
}

init();
</script>
</body>
</html>
